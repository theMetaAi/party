<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Partying派對 | 文字陪聊員 招募</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --purple-deep:   #2b0060;
    --purple-mid:    #4a00a0;
    --purple-vivid:  #7c22e8;
    --purple-bright: #9333ea;
    --purple-light:  #c084fc;
    --green-logo:    #7ed321;
    --green-bright:  #a3e635;
    --pink-accent:   #e879f9;
    --white:         #ffffff;
    --card-bg:       rgba(255,255,255,0.97);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--purple-deep);
    color: var(--white);
    overflow-x: hidden;
  }

  /* ── Background ── */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(155deg,
      #1e0048 0%, #3d0088 30%, #5c12b8 55%, #3a007a 80%, #1e0048 100%);
    overflow: hidden;
  }
  /* diagonal stripe */
  .bg::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      -52deg,
      transparent, transparent 44px,
      rgba(255,255,255,0.028) 44px, rgba(255,255,255,0.028) 88px
    );
  }
  /* blob shapes */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.35;
    animation: pulse 9s ease-in-out infinite alternate;
  }
  .blob-1 { width:280px; height:280px; background:#6d28d9; top:-80px; right:-60px; animation-delay:0s; }
  .blob-2 { width:220px; height:220px; background:#9333ea; bottom:35%; left:-80px; animation-delay:-4s; }
  .blob-3 { width:180px; height:180px; background:#7ed321; bottom:8%; right:-40px; animation-delay:-7s; opacity:.2; }
  @keyframes pulse {
    from { transform: scale(1); }
    to   { transform: scale(1.18) rotate(10deg); }
  }

  /* ── Layout ── */
  .container {
    position: relative; z-index: 1;
    max-width: 430px; margin: 0 auto;
    padding-bottom: 52px;
  }

  /* ── TOP HEADER ── */
  .header {
    padding: 24px 20px 10px;
    text-align: center;
  }
  .brand-pill {
    display: inline-flex; align-items: center; gap: 9px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 50px;
    padding: 7px 18px 7px 9px;
    margin-bottom: 4px;
  }
  .brand-icon {
    width: 36px; height: 36px;
    background: var(--green-logo);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .brand-name {
    font-size: 15px; font-weight: 900; color: var(--white);
  }
  .brand-name em { color: var(--green-bright); font-style: normal; }
  .brand-sub {
    font-size: 11px; letter-spacing: 3px; color: var(--purple-light);
    font-weight: 700; text-transform: uppercase; margin-top: 6px;
  }

  /* ── CTA BUTTON ── */
  .cta-wrap { padding: 18px 20px 0; }
  .cta-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%;
    background: linear-gradient(130deg, #8b21e8 0%, #be21d8 50%, #d9337a 100%);
    color: var(--white);
    font-size: 18px; font-weight: 900;
    text-decoration: none;
    border-radius: 50px;
    padding: 17px 20px;
    letter-spacing: .5px;
    box-shadow: 0 6px 32px rgba(147,51,234,.55), 0 0 0 3px rgba(255,255,255,.09);
    position: relative; overflow: hidden;
    transition: transform .15s;
  }
  .cta-btn::after {
    content:'';
    position:absolute; top:0; left:-120%;
    width:60%; height:100%;
    background: linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);
    animation: sweep 2.6s infinite;
  }
  @keyframes sweep { to { left:180%; } }
  .cta-btn:active { transform: scale(.97); }
  .cta-icon { font-size:20px; }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
    margin: 28px 20px;
  }

  /* ── HERO TEXT ── */
  .hero {
    padding: 0 20px; margin-bottom: 30px; text-align: center;
  }
  .hero-line1 {
    font-size: 30px; font-weight: 900; line-height: 1.3;
    color: var(--white);
    text-shadow: 0 2px 18px rgba(147,51,234,.5);
    margin-bottom: 10px;
  }
  .hero-line2 {
    font-size: 32px; font-weight: 900; line-height: 1.3;
    color: var(--white);
    text-shadow: 0 2px 18px rgba(147,51,234,.5);
  }
  .hero-line2 .highlight {
    color: var(--green-bright);
    text-shadow: 0 0 22px rgba(163,230,53,.65);
  }

  /* ── WHITE CARD ── */
  .card {
    margin: 0 20px 30px;
    background: var(--card-bg);
    border-radius: 22px;
    padding: 30px 22px 22px;
    position: relative;
    box-shadow: 0 14px 55px rgba(0,0,0,.38), 0 0 0 1.5px rgba(147,51,234,.25);
  }

  /* Hi bubble */
  .hi {
    position: absolute;
    top: -24px; left: -12px;
    width: 56px; height: 56px;
    background: var(--green-logo);
    border-radius: 50% 50% 50% 12%;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; font-weight: 900; color: #fff;
    box-shadow: 0 4px 18px rgba(126,211,33,.55);
    letter-spacing: -1px;
  }
  .hi::after {
    content: '';
    position: absolute; bottom: -8px; left: 10px;
    border: 9px solid transparent;
    border-top-color: var(--green-logo);
    border-right: 4px solid transparent;
  }

  .card-body {
    font-size: 15px; font-weight: 500;
    color: #250055; line-height: 1.9;
    text-align: center; margin-bottom: 14px;
  }
  .card-body2 {
    font-size: 15px; font-weight: 500;
    color: #250055; line-height: 1.9;
    text-align: center; margin-bottom: 22px;
  }
  .card-body2 .kw {
    color: var(--purple-vivid); font-weight: 900;
  }

  /* Card bottom strip */
  .card-strip {
    background: linear-gradient(130deg, #7c22e8 0%, #c026d3 100%);
    border-radius: 50px;
    padding: 13px 18px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .strip-text  { font-size:14px; font-weight:900; color:#fff; letter-spacing:.3px; }
  .strip-brand { font-size:15px; font-weight:900; color: var(--green-bright); letter-spacing:1px; }
  .strip-icon  { font-size:19px; }

  /* ── AD IMAGE ── */
  .ad-wrap {
    padding: 0 20px; margin-bottom: 26px;
  }
  .ad-wrap img {
    width: 100%; border-radius: 18px; display: block;
    box-shadow: 0 10px 50px rgba(0,0,0,.5), 0 0 0 2px rgba(147,51,234,.3);
  }

  /* ── BOTTOM CTA ── */
  .bottom-cta { padding: 0 20px; }
  .cta-note {
    text-align: center; font-size: 12px;
    color: rgba(255,255,255,.38); margin-top: 14px; letter-spacing:.5px;
  }
</style>
</head>
